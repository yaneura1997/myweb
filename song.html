<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>UmeCha song</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/png" href="image/favicon.png">
</head>

<body>

  <!-- ===== ヘッダー ===== -->
  <header class="header">

    <!-- 左：ホームリンク -->
    <a href="index.html" class="header-home">
      <span class="logo-main">UmeCha</span>
      <span class="logo-sub">OFFICIAL</span>
    </a>

    <!-- 右：ハンバーガー -->
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- ===== ハンバーガーメニュー中身（追加）===== -->
    <nav class="hamburger-menu">
      <a href="index.html">Home</a>
      <a href="profile.html">Profile</a>
      <a href="plate.html">Plate</a>
      <a href="song.html">Song</a>
      <a href="engineer.html">Engineer</a>   
    </nav>

  </header>

  <!-- ===== 本文 ===== -->
<main class="song">

  <h1 class="song-title">song</h1>

  <!-- カテゴリ -->
    <div class="song-menu">
      <a href="#" class="active" data-filter="all">ALL</a>
      <a href="#" data-filter="single">Single</a>
      <a href="#" data-filter="album">Album</a>
    </div>

  <!-- 一覧 -->
 <div class="song-grid">
  <a href="曲詳細/ホワイトデイズ.html" class="song-card" data-category="single">

  <img src="image/ホワイトデイズ_ジャケ写.jpg" alt="ホワイトデイズ">

  <h2>ホワイトデイズ</h2>
  <p>Single</p>
  </a>
 </div>
</main>

  <footer class="footer">
    <p>© UmeCha</p>
  </footer>

  <!-- ハンバーガーメニュー -->
  <script>
    const hamburger = document.querySelector(".hamburger");
    const menu = document.querySelector(".hamburger-menu");

    hamburger.addEventListener("click", () => {
      menu.classList.toggle("is-open");
    });
  </script>

  <!-- songフィルター -->
  <script>
    const buttons = document.querySelectorAll(".song-menu a");
    const cards = document.querySelectorAll(".song-card");

    buttons.forEach(button => {

      button.addEventListener("click", e => {

        e.preventDefault();

        // 選択中デザイン
        buttons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");

        const filter = button.dataset.filter;

        cards.forEach(card => {

          if (filter === "all" || card.dataset.category === filter) {
            card.style.display = "block";
          } else {
            card.style.display = "none";
          }

        });

      });

    });
  </script>

</body>
</html>
