    <!-- メイン画像 -->
    <img

        現在もオリジナル楽曲の制作・ライブ活動を行っている。

    ======================================== -->

    <section class="sns-zone">

      <p class="sns-title">
        My Icons

      <div class="sns-icons">

        <a href="https://www.instagram.com/yaneura_no_inuha/"

          <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="https://x.com/yaneuranoinuha"
